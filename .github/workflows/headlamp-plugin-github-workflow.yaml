name: inspektor-gadget-headlamp-plugin linting, type checking, testing

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PLUGIN_NAME: inspektor-gadget
  releaseName: latest

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4 
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Check
        run: npx @kinvolk/headlamp-plugin lint .

      - name: Format check
        run: npx @kinvolk/headlamp-plugin format --check .
      
      - name: Type checking
        run: npx @kinvolk/headlamp-plugin tsc .

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
